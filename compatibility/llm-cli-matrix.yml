version: 1
updated: "2026-04-26"
purpose: >
  Track which shared instruction and skill surfaces are expected to work across
  Claude Code, Codex, and Gemini CLI. Use this file when reviewing changes that
  may affect cross-LLM behavior.

tools:
  claude-code:
    entrypoint: "CLAUDE.md"
    shared_instruction: "AI_AGENT_INSTRUCTIONS.md"
    hook_config: ".claude/settings.json"
    status: "supported"
    notes:
      - "Reads CLAUDE.md as the thin entrypoint for this repository."
      - "Project-level hooks are merged into or linked from .claude/settings.json."
      - "Use setup.md when onboarding users through natural language."
  codex:
    entrypoint: "AGENTS.md"
    shared_instruction: "AI_AGENT_INSTRUCTIONS.md"
    hook_config:
      - ".codex/config.toml"
      - ".codex/hooks.json"
    status: "supported"
    notes:
      - "Reads AGENTS.md as the thin entrypoint for this repository."
      - "Skills can be linked into Codex-specific skill directories when needed."
      - "Codex hooks require codex_hooks=true in an active config.toml layer."
  gemini-cli:
    entrypoint: "GEMINI.md"
    shared_instruction: "AI_AGENT_INSTRUCTIONS.md"
    hook_config: ".gemini/settings.json"
    status: "supported"
    notes:
      - "Reads GEMINI.md as the thin entrypoint for this repository."
      - "Avoid assuming Claude-only slash commands work in Gemini CLI."
      - "Project-level hooks are merged into or linked from .gemini/settings.json."

shared_surfaces:
  instruction_entrypoints:
    files:
      - "instructions/AGENTS.md"
      - "instructions/CLAUDE.md"
      - "instructions/GEMINI.md"
      - "instructions/AI_AGENT_INSTRUCTIONS.md"
      - "instructions/.github/copilot-instructions.md"
    compatibility: "required"
    review_rule: "Do not update one entrypoint without checking whether the shared instruction path still matches."
  shared_skills:
    source: "skills/*/SKILL.md"
    compatibility: "conditional"
    review_rule: "A skill must define realistic activation wording and should not rely on a single LLM vendor's private behavior unless documented."
  shared_hooks:
    source: "hooks/"
    compatibility: "conditional"
    install_rule: "Keep hook scripts in this repository and expose them through AI_AGENT_HOOKS_RUNTIME_LINK plus each CLI's official config folder."
    merge_rule: "If an existing CLI settings file is present, append or merge managed hook entries instead of replacing personal settings."
    review_rule: "Hooks should enforce deterministic lifecycle behavior or safety gates; expensive peer-LLM behavior must be opt-in, timeout-bounded, and fail open."
  natural_language_setup:
    files:
      - "README.md"
      - "setup.md"
    compatibility: "required"
    review_rule: "A beginner should be able to paste the setup request into any supported LLM CLI and continue without command-writing expertise."
  natural_language_operations:
    files:
      - "README.md"
      - "setup.md"
      - "instructions/AI_AGENT_INSTRUCTIONS.md"
      - "scripts/health-check.sh"
      - "scripts/update.sh"
    compatibility: "required"
    review_rule: "Urgent update and health-check phrases must map to scripts through plain language in every supported LLM CLI."
  skill_improvement_automation:
    files:
      - "README.md"
      - "setup.md"
      - "docs/skill-improvement-automation.md"
      - "scripts/skill-improvement-bot.py"
      - "scripts/schedule-skill-improvement.sh"
    compatibility: "conditional"
    review_rule: "Local log scanning must keep raw logs local, redact summaries, and require explicit opt-in for PR creation, review application, and auto-merge."

review_tags:
  portable:
    meaning: "Expected to work across Claude Code, Codex, and Gemini CLI."
  claude-code-only:
    meaning: "Uses Claude Code-specific behavior. Add a fallback or document why portability is not required."
  codex-only:
    meaning: "Uses Codex-specific behavior. Add a fallback or document why portability is not required."
  gemini-cli-only:
    meaning: "Uses Gemini CLI-specific behavior. Add a fallback or document why portability is not required."
  unknown:
    meaning: "Compatibility has not been verified. Treat as a review blocker for shared instructions."
